<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/video.js@7.10.2/dist/video-js.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
      }
      #my-player {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <video id="my-player" class="video-js" controls playsinline>
      <source
        src="https://api.qqsuu.cn/api/dm-xjj?type=video"
        type="video/mp4"
      />
    </video>
    <script src="https://cdn.jsdelivr.net/npm/video.js@7.10.2/dist/video.min.js"></script>
    <script>
      const player = videojs(
        "my-player",
        { autoplay: "any" },
        function onPlayerReady() {
          this.play();
          this.on("ended", function () {
            this.src({
              type: "video/mp4",
              src: `https://api.qqsuu.cn/api/dm-xjj?type=video&$ts=${new Date().getTime()}`
            });
          });
        }
      );
    </script>
  </body>
</html>
